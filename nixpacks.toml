[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mongodb", "php82Extensions.redis", "php82Packages.composer"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs"
]

[phases.build]
cmds = [
  "mkdir -p /app/php-ini",
  "echo 'extension=/nix/store/mybm081wdk14lqdgkah5072hq66j1acr-php-mongodb-1.20.1/lib/php/extensions/mongodb.so' > /app/php-ini/custom.ini",
  "echo 'extension=/nix/store/2dhx5979dbd30c1x5ydqvbx7x0czxcz9-php-redis-6.1.0/lib/php/extensions/redis.so' >> /app/php-ini/custom.ini"
]

[start]
cmd = "php -c /app/php-ini/custom.ini -S 0.0.0.0:$PORT -t ."